<!DOCTYPE html>
<html>
<head>
  <title>YouTube Summarizer Options</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 400px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input[type="text"], input[type="password"] { width: 100%; padding: 8px; box-sizing: border-box; }
    button { padding: 10px 15px; cursor: pointer; }
    #status { margin-top: 10px; color: green; }
  </style>
</head>
<body>
  <h2>Configuration</h2>
  <div class="form-group">
    <label for="apiUrl">API Endpoint URL</label>
    <input type="text" id="apiUrl" placeholder="e.g. http://localhost:8000" />
  </div>
  <div class="form-group">
    <label for="apiKey">API Key (x-api-key)</label>
    <input type="password" id="apiKey" placeholder="Your API Auth Token" />
  </div>
  <button id="saveBtn">Save</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
