<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; padding: 10px; width: 250px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 12px; }
    select { width: 100%; padding: 5px; }
    button { width: 100%; padding: 8px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
    button:hover { background-color: #0056b3; }
    #status { margin-top: 10px; font-size: 12px; word-break: break-word; }
    #urlDisplay { font-size: 10px; color: #555; margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>
  <h4>Summarize Video</h4>
  <div id="urlDisplay">Loading URL...</div>
  
  <div class="form-group">
    <label for="detailLevel">Summary Depth</label>
    <select id="detailLevel">
      <option value="1">1 - Concise</option>
      <option value="2" selected>2 - Standard</option>
      <option value="3">3 - Deep Dive</option>
    </select>
  </div>
  
  <button id="summarizeBtn">Summarize & Email</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
